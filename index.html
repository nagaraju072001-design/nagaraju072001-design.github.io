<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Happy Birthday 🎂</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: black;
            color: white;
            text-align: center;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            animation: fade 2s;
        }

        .active {
            display: flex;
        }

        img {
            width: 300px;
            height: 300px;
            border-radius: 20px;
            box-shadow: 0 0 30px pink;
        }

        h1 {
            font-size: 50px;
            animation: glow 2s infinite alternate;
        }

        p {
            font-size: 24px;
        }

        @keyframes fade {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px pink;
            }

            to {
                text-shadow: 0 0 30px red;
            }
        }
    </style>
</head>

<body>

    <!-- 🎵 Background Music -->
    <audio autoplay loop>
        <source src="song.mp3" type="audio/mp3">
    </audio>

    <!-- Slide 1 -->
    <div class="slide active">
        <h1>🎉 Happy Birthday 🎂</h1>
        <p>Wishing you a day full of love & happiness</p>
    </div>

    <!-- Slide 2 -->
    <div class="slide">
        <img src="photo1.jpg">
        <p>You are My Love 💖</p>
    </div>

    <!-- Slide 3 -->
    <div class="slide">
        <img src="photo2.jpg">
        <p>Stay blessed and keep smiling 😊</p>
    </div>

    <!-- Slide 4 -->
    <div class="slide">
        <h1>🎈 Dont Forget me 🎈</h1>
    </div>

    <script>
        let slides = document.querySelectorAll(".slide");
        let index = 0;

        function showSlides() {
            slides[index].classList.remove("active");
            index = (index + 1) % slides.length;
            slides[index].classList.add("active");
        }

        setInterval(showSlides, 4000); // change every 4 sec
    </script>

</body>

</html>
