<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    text-align: center;

    /* Romantic Background */
    background: url("https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2") no-repeat center center/cover;
}

.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
}

.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    padding: 20px;
}

.active {
    display: flex;
    animation: fade 2s;
}

img {
    width: 260px;
    height: 260px;
    border-radius: 20px;
    box-shadow: 0 0 25px pink;
    object-fit: cover;
}

h1 {
    color: #ff4d6d;
}

p {
    font-size: 22px;
    max-width: 600px;
}

@keyframes fade {
    from {opacity: 0;}
    to {opacity: 1;}
}

/* Floating hearts */
.heart {
    position: absolute;
    color: pink;
    animation: float 6s linear infinite;
}

@keyframes float {
    from {transform: translateY(100vh);}
    to {transform: translateY(-10vh);}
}
</style>
</head>

<body>

<div class="overlay"></div>

<!-- 🎵 Music -->
<audio id="music" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<button onclick="document.getElementById('music').play()" 
style="position:absolute;top:20px;right:20px;padding:10px;border:none;background:pink;color:white;border-radius:10px;">
Play Music ❤️
</button>

<!-- Slides -->
<div class="slide active">
    <h1>Happy Birthday My Love ❤️</h1>
    <p>I may not be with you today... but my heart is always with you 💕</p>
</div>

<div class="slide">
    <p>I miss you every single moment 💔</p>
</div>

<div class="slide">
    <p>No distance can ever reduce my love for you 🌍❤️</p>
</div>

<!-- IMAGE SLIDES AUTO GENERATED -->
<script>
let images = [
"https://i.imgur.com/photo1.jpg",
"https://i.imgur.com/photo2.jpg",
"https://i.imgur.com/photo3.jpg"
];

let container = document.body;

images.forEach((src) => {
    let div = document.createElement("div");
    div.className = "slide";
    div.innerHTML = `<img src="${src}"><p>Every memory with you is special 💖</p>`;
    container.appendChild(div);
});
</script>

<!-- FINAL MESSAGE -->
<div class="slide">
    <h1>I Love You Forever ❤️</h1>
    <p>No matter how far we are, you are always in my heart 💕</p>
</div>

<script>
let slides = document.querySelectorAll(".slide");
let index = 0;

function showSlides() {
    slides[index].classList.remove("active");
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");
}

setInterval(showSlides, 5000); // 5 sec per slide (~3+ min total if many slides)

// Floating hearts
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.style.left = Math.random() * 100 + "vw";
    heart.innerHTML = "❤️";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}, 500);
</script>

</body>
</html>
